#debug=[mpi]
#debug=[all]
topology {
 name = dragonfly
 geometry = [17,9] # [num_switches_per_group, num_groups] — matches Frontier Slingshot
 concentration = 8 # compute nodes per switch
 h = 8 # global connecting ports
}

switch {
 router {
  name = dragonfly_minimal
  #name = dragonfly_valiant
  #name = dragonfly_ugal
  seed = 14
 }
}

node {
 app1 {
    # Fixed-time quanta charts (reproduce Fig 3a of CUG24 paper)
    ftq {
     type = ftq_calendar
     epoch_length = 1s
     output = ftq
     group = app1
    }
    indexing = block
    allocation = first_available
    name = parsedumpi
    # DUMPI trace generated by GPCNeT network_test with sst-dumpi instrumentation
    # Regenerate with: submit_gpcnet_dumpi.slurm
    dumpi_metaname = gpcnet_dumpi.meta
    launch_cmd = aprun -n NRANKS -N RANKSPERNODE
    env {
      SLURM_NPROCS = NRANKS
    }
    start = 0ms
 }
 nic {
  name = pisces
  injection {
   mtu = 4096
   arbitrator = cut_through
   bandwidth = 25.0GB/s
   latency = 50ns
   credits = 64KB
  }
  ejection {
   latency = 50ns
  }
 }
 memory {
  name = pisces
  total_bandwidth = 10GB/s
  latency = 10ns
  max_single_bandwidth = 10GB/s
 }
 proc {
  ncores = 8
  frequency = 3.7GHz
 }
 name = simple
}

switch {
 name = pisces
 arbitrator = cut_through
 mtu = 4096
 link {
  bandwidth = 25.0GB/s
  latency = 100ns
  credits = 64KB
 }
 xbar {
  bandwidth = 200GB/s
 }
 logp {
  bandwidth = 25GB/s
  hop_latency = 100ns
  out_in_latency = 100ns
 }
}
