# SST-Macro Dragonfly 1056-node Baseline Sweep Configuration (SNAPPR model)
# Topology: 33 groups × 8 routers/group × 4 hosts/router = 1056 hosts
# Matches BookSim2 dragonflynew k=4 (exact same topology)
# Matches RAPS build_dragonfly(d=8, a=32, p=4)
# h = G-1 = 32 (even ✓, no parity error)
# App: offered_load, injection controlled via constant_delay
#
# NOTE: offered_load crashes on dragonfly when run as single-app.
# Workaround: use two-app format with a near-zero-traffic dummy app2.
# app1 uses 1052 ranks (263 routers × 4 hosts), app2 dummy uses 4 ranks (1 router).
# Total = 1056 = topology hosts exactly.
#
# constant_delay = message_size × max_coeff / (ρ × link_bw)
# max_coeff computed by RAPS for 1052-node permutation (see run_sweep.sh)
# Template: substitute CONSTANT_DELAY_NS, DESTINATIONS_LIST before running

node {
  app1 {
    indexing = block
    allocation = first_available
    name = offered_load
    launch_cmd = aprun -n 1052 -N 4

    # Message parameters
    message_size = 64KB
    niterations = 20
    variable_delay = 0.0ns
    constant_delay = CONSTANT_DELAY_NSns

    # destinations[i] = rank that rank i sends to (1-to-1 permutation, seed=42, N=1052)
    # Generated by run_sweep.sh using RAPS dragonfly routing; max_coeff computed
    # for this permutation to ensure max link utilization == rho_target.
    destinations = DESTINATIONS_LIST

    start = 0ms
  }

  # Dummy app2: workaround for SST-Macro single-app offered_load crash on dragonfly.
  # Occupies last 4 hosts (1 router), sends with ~1000s delay → negligible traffic.
  app2 {
    indexing = block
    allocation = first_available
    name = offered_load
    launch_cmd = aprun -n 4 -N 4

    message_size = 64KB
    niterations = 1
    variable_delay = 0.0ns
    constant_delay = 1000000000000ns
    destinations = [1, 2, 3, 0]

    start = 0ms
  }

  nic {
    name = snappr
    mtu = 4KB
    credits = 64KB
    bandwidth = 25.0GB/s
    latency = 50ns
    injection {
      bandwidth = 25.0GB/s
      latency = 50ns
      credits = 64KB
    }
  }

  memory {
    name = snappr
    channel_bandwidth = 100GB/s
    num_channels = 1
    latency = 10ns
  }
  proc {
    ncores = 4
    frequency = 2.5GHz
  }
  name = simple
}

switch {
  name = snappr
  mtu = 4KB
  credits = 64KB
  link {
    bandwidth = 25.0GB/s
    latency = 100ns
    credits = 64KB
  }
  logp {
    bandwidth = 25GB/s
    hop_latency = 100ns
    out_in_latency = 100ns
  }
  router {
    name = dragonfly_minimal
    seed = 42
  }
}

topology {
  name = dragonfly
  # [routers_per_group, num_groups] = 8 routers/group, 33 groups
  geometry = [8, 33]
  # hosts per router
  concentration = 4
  # global links per router (G-1 = 32, 1 link/router/group = all-to-all)
  h = 32
  inter_group = alltoall
}
