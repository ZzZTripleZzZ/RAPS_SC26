# SST-Macro Bully-Victim Interference: Fat-tree k=16 (1024 nodes)
# Topology: k=16 → k^3/4 = 1024 hosts
# Matches RAPS Lassen fat-tree config (FATTREE_K=16 for 1000 nodes)
# Routing: fat_tree (minimal)
#
# TEMPLATE — bully_victim.py substitutes:
#   BULLY_DELAY_NS     → bully constant_delay
#   VICTIM_DELAY_NS    → victim constant_delay
#   BULLY_N            → bully rank count (app1)
#   VICTIM_N           → total victim rank count (app2)
#   BULLY_DESTS        → bully destination permutation
#   VICTIM_DESTS       → victim destination permutation
#   TOTAL_N            → total ranks (bully + victim)
#
# app1 = bully (ranks 0..BULLY_N-1)
# app2 = victims (ranks BULLY_N..TOTAL_N-1)

node {
  app1 {
    indexing = block
    allocation = first_available
    name = offered_load
    launch_cmd = aprun -n BULLY_N -N 1

    message_size = 64KB
    niterations = 50
    variable_delay = 0.0ns
    constant_delay = BULLY_DELAY_NSns
    destinations = BULLY_DESTS
    start = 0ms
  }

  app2 {
    indexing = block
    allocation = first_available
    name = offered_load
    launch_cmd = aprun -n VICTIM_N -N 1

    message_size = 64KB
    niterations = 50
    variable_delay = 0.0ns
    constant_delay = VICTIM_DELAY_NSns
    destinations = VICTIM_DESTS
    start = 0ms
  }

  nic {
    name = pisces
    injection {
      mtu = 4096
      arbitrator = cut_through
      bandwidth = 12.5GB/s
      latency = 50ns
      credits = 64KB
    }
    ejection {
      latency = 50ns
    }
  }

  memory {
    name = pisces
    total_bandwidth = 100GB/s
    latency = 10ns
    max_single_bandwidth = 100GB/s
  }
  proc {
    ncores = 1
    frequency = 2.5GHz
  }
  name = simple
}

switch {
  name = pisces
  arbitrator = cut_through
  mtu = 4096
  link {
    bandwidth = 12.5GB/s
    latency = 100ns
    credits = 64KB
  }
  xbar {
    bandwidth = 100GB/s
  }
  logp {
    bandwidth = 12.5GB/s
    hop_latency = 100ns
    out_in_latency = 100ns
  }
  router {
    name = fat_tree
    seed = 42
  }
}

topology {
  name = fat_tree
  k = 16
}
