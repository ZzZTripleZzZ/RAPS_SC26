# SST-Macro Dragonfly 72-node Baseline Sweep Configuration (SNAPPR model)
# Topology: 9 groups × 4 routers/group × 2 hosts/router = 72 hosts
# Routing: dragonfly_minimal
# Traffic: offered_load with permutation destinations
#
# Template: run_sweep.sh substitutes CONSTANT_DELAY_NS and DESTINATIONS_LIST

node {
  app1 {
    indexing = block
    allocation = first_available
    name = offered_load
    launch_cmd = aprun -n 72 -N 2

    message_size = 64KB
    niterations = 20
    variable_delay = 0.0ns
    constant_delay = CONSTANT_DELAY_NSns
    destinations = DESTINATIONS_LIST
    start = 0ms
  }

  nic {
    name = snappr
    mtu = 4KB
    credits = 64KB
    bandwidth = 25.0GB/s
    latency = 50ns
    injection {
      bandwidth = 25.0GB/s
      latency = 50ns
      credits = 64KB
    }
  }

  memory {
    name = snappr
    channel_bandwidth = 100GB/s
    num_channels = 1
    latency = 10ns
  }
  proc {
    ncores = 4
    frequency = 2.5GHz
  }
  name = simple
}

switch {
  name = snappr
  mtu = 4KB
  credits = 64KB
  link {
    bandwidth = 25.0GB/s
    latency = 100ns
    credits = 64KB
  }
  logp {
    bandwidth = 25GB/s
    hop_latency = 100ns
    out_in_latency = 100ns
  }
  router {
    name = dragonfly_minimal
    seed = 42
  }
}

topology {
  name = dragonfly
  geometry = [4, 9]
  concentration = 2
  h = 8
  inter_group = alltoall
}
