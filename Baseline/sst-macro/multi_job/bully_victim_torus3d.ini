# SST-Macro Bully-Victim Interference: 3D Torus (Blue Waters analog)
# Topology: hdtorus [8,8,8], concentration=2 → 8*8*8*2 = 1024 hosts
# Matches RAPS bluewaters torus3d config (TORUS3D_PARAMS for 1000 nodes)
# Routing: dimension_order (matches RAPS dor_xyz)
#
# TEMPLATE — bully_victim.py substitutes:
#   BULLY_DELAY_NS     → bully constant_delay
#   VICTIM_DELAY_NS    → victim constant_delay
#   BULLY_N            → bully rank count (app1)
#   VICTIM_N           → total victim rank count (app2)
#   BULLY_DESTS        → bully destination permutation
#   VICTIM_DESTS       → victim destination permutation
#   TOTAL_N            → total ranks (bully + victim)
#
# app1 = bully (ranks 0..BULLY_N-1)
# app2 = victims (ranks BULLY_N..TOTAL_N-1)

node {
  app1 {
    indexing = block
    allocation = first_available
    name = offered_load
    launch_cmd = aprun -n BULLY_N -N 2

    message_size = 64KB
    niterations = 50
    variable_delay = 0.0ns
    constant_delay = BULLY_DELAY_NSns
    destinations = BULLY_DESTS
    start = 0ms
  }

  app2 {
    indexing = block
    allocation = first_available
    name = offered_load
    launch_cmd = aprun -n VICTIM_N -N 2

    message_size = 64KB
    niterations = 50
    variable_delay = 0.0ns
    constant_delay = VICTIM_DELAY_NSns
    destinations = VICTIM_DESTS
    start = 0ms
  }

  nic {
    name = pisces
    injection {
      mtu = 4096
      arbitrator = cut_through
      bandwidth = 9.6GB/s
      latency = 50ns
      credits = 64KB
    }
    ejection {
      latency = 50ns
    }
  }

  memory {
    name = pisces
    total_bandwidth = 100GB/s
    latency = 10ns
    max_single_bandwidth = 100GB/s
  }
  proc {
    ncores = 2
    frequency = 2.5GHz
  }
  name = simple
}

switch {
  name = pisces
  arbitrator = cut_through
  mtu = 4096
  link {
    bandwidth = 9.6GB/s
    latency = 100ns
    credits = 64KB
  }
  xbar {
    bandwidth = 100GB/s
  }
  logp {
    bandwidth = 9.6GB/s
    hop_latency = 100ns
    out_in_latency = 100ns
  }
  router {
    name = dimension_order
    seed = 42
  }
}

topology {
  name = hdtorus
  geometry = [8, 8, 8]
  concentration = 2
}
